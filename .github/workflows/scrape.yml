name: scrape

on:
  schedule:
    - cron: "0 4 * * *"   # daily ~09:00 PKT — run tracker
    - cron: "0 3 * * 0"   # Sundays — deep board discovery first
  workflow_dispatch:

permissions:
  contents: write

concurrency: scrape

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Weekly deep discovery
        if: github.event.schedule == '0 3 * * 0'
        run: node discover.js
      - name: Run tracker
        run: node tracker.js
      - name: Commit updated data
        run: |
          git config user.name "job-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data reports
          git diff --cached --quiet || git commit -m "chore: scrape $(date -u '+%F %H:%M')"
          git push
