name: scrape

on:
  schedule:
    # 4x daily, timed for IST (UTC+5:30): 05:00, 11:00, 17:00, 23:00 IST.
    # The 05:00 IST run captures the full US workday's postings.
    # (:30 offset avoids GitHub's congested top-of-hour scheduling.)
    - cron: "30 5,11,17,23 * * *"
    - cron: "0 3 * * 0"   # Sundays — deep board discovery first
  workflow_dispatch:

permissions:
  contents: write

concurrency: scrape

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Weekly deep discovery
        if: github.event.schedule == '0 3 * * 0'
        run: node discover.js
      - name: Run tracker
        run: node tracker.js
      - name: Push jobs to Postgres
        if: env.DATABASE_URL != ''
        run: |
          npm install --no-audit --no-fund
          node scripts/push-db.js
      - name: Commit updated data
        run: |
          git config user.name "job-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data reports
          git diff --cached --quiet || git commit -m "chore: scrape $(date -u '+%F %H:%M')"
          git push
